<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkubator Telur Pintar</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-egg"></i> INKUBATOR TELUR</h1>
    </div>
    
    <div class="sensor-grid">
        <div class="sensor-card">
            <div class="sensor-title"><i class="fas fa-temperature-half"></i> Suhu</div>
            <div class="sensor-value temp-val"><span id="suhu">--</span> <span style="font-size: 16px;">°C</span></div>
        </div>
        <div class="sensor-card">
            <div class="sensor-title"><i class="fas fa-droplet"></i> Kelembaban</div>
            <div class="sensor-value hum-val"><span id="kelembaban">--</span> <span style="font-size: 16px;">%</span></div>
        </div>
    </div>
    
    <div class="status-section">
        <div class="status-row">
            <div class="status-label"><i class="far fa-lightbulb"></i> Status Lampu</div>
            <div class="status-badge" id="lampuStatus">--</div>
        </div>
        <div class="status-row">
            <div class="status-label"><i class="fas fa-microchip"></i> Mode Operasi</div>
            <div class="status-badge" id="modeStatus">--</div>
        </div>
    </div>
    
    <div class="controls-grid">
        <button class="btn btn-success" onclick="setLampu(true)"><i class="fas fa-power-off"></i> Lampu ON</button>
        <button class="btn btn-danger" onclick="setLampu(false)"><i class="fas fa-power-off"></i> Lampu OFF</button>
    </div>
    <button id="modeBtn" class="btn btn-primary" onclick="toggleMode()"><i class="fas fa-exchange-alt"></i> UBAH MODE</button>
    
    <div class="settings-section">
        <div class="setting-group">
            <div class="setting-label"><i class="fas fa-fire-extinguisher" style="color: #ef4444;"></i> Auto Lampu Mati (°C)</div>
            <div class="setting-controls">
                <input type="number" step="0.1" id="suhuThreshold" class="setting-input" value="33.0">
                <button class="btn-set" onclick="setSuhuThreshold()">SET</button>
            </div>
        </div>
        <div class="setting-group">
            <div class="setting-label"><i class="fas fa-stopwatch" style="color: #6b7280;"></i> Putar Telur (menit)</div>
            <div class="setting-controls">
                <input type="number" step="0.1" id="interval" class="setting-input" value="180.0">
                <button class="btn-set" onclick="setIntervalServo()">SET</button>
            </div>
        </div>
        <div class="note">(misal: 0.5 = 30 detik)</div>
    </div>
    
    <div class="footer">© 2026, Kelompok 7 INTEL Sistem Informasi Jaringan & Aplikasi SMK Negeri 2 Yogyakarta</div>
</div>

<script src="script.js"></script>
</body>
</html>
